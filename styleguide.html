<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style2.css" />
  </head>

  <body>
    <div class="p-l-5rem p-r-5rem">
      <div
        class="width100 p-t-5rem p-b-2rem flex-container flex-row flex-spacebetween">
        <div class="text-text">Style Guide</div>
        <div class="text-text">Future Communications</div>
      </div>

      <!-- Colours -->
      <div class="width100 p-b-05rem"><div class="text-text">Colours</div></div>
      <div class="width100 flex-container flex-row flex-spacebetween">
        <div class="flex-container flex-column">
          <div class="bgbox bg-yellow"></div>
          <div class="text-text white">Yellow</div>
          <div class="text-text white">#fff200</div>
        </div>
        <div class="flex-container flex-column">
          <div class="bgbox bg-green"></div>
          <div class="text-text white">Green</div>
          <div class="text-text white">#00ff00</div>
        </div>
        <div class="flex-container flex-column">
          <div class="bgbox bg-grey border-white"></div>
          <div class="text-text white">Grey</div>
          <div class="text-text white">#8f8f8f</div>
        </div>
        <div class="flex-container flex-column">
          <div class="bgbox bg-white"></div>
          <div class="text-text white">White</div>
          <div class="text-text white">#ffffff</div>
        </div>
        <div class="flex-container flex-column">
          <div class="bgbox bg-skin"></div>
          <div class="text-text white">Skin</div>
          <div class="text-text white">#d7ab90</div>
        </div>
      </div>

      <!-- Type -->
      <div class="width100 p-t-2rem p-b-05rem">
        <div class="text-text p-b-05rem">Type</div>
        <div class="flex-container flex-row flex-spacebetween">
          <div class="text-shout white">Shout</div>
          <div class="text-callout white">Callout</div>
          <div class="text-hero white">Hero</div>
          <div class="text-body white">Body</div>
          <div class="text-caption white">Caption</div>
          <div class="text-box white">Text Box</div>
        </div>
      </div>

      <!-- Image -->
      <div class="width100 p-t-2rem p-b-05rem">
        <div class="text-text p-b-05rem">Images</div>
        <div class="flex-container flex-row flex-spacebetween">
          <div class="flex-container flex-column">
            <div class="image-box fixed-size">
              <img src="New Images/paparazzi-1.png" alt="" />
            </div>
            <div class="text-text white">Standard</div>
          </div>
          <div class="flex-container flex-column">
            <div class="image-box fixed-size">
              <img src="New Images/paparazzi-1.png" alt="" />
            </div>
            <div class="text-caption white">Caption</div>
            <div class="text-text white">Caption</div>
          </div>
          <div class="flex-container flex-column">
            <div class="image-box fixed-size border-yellow">
              <img src="New Images/paparazzi-1.png" alt="" />
            </div>
            <div class="text-text white">Yellow Border</div>
          </div>
          <div class="flex-container flex-column">
            <div class="image-box fixed-size border-green">
              <img src="New Images/paparazzi-1.png" alt="" />
            </div>
            <div class="text-text white">Green Border</div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
.
